name: Deploy clinical-record-service

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_URI: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.us-east-1.amazonaws.com
        run: |
          docker build -t $ECR_URI/medic/clinical-record-service:${{ github.sha }} .
          docker push $ECR_URI/medic/clinical-record-service:${{ github.sha }}
          docker tag $ECR_URI/medic/clinical-record-service:${{ github.sha }} \
                     $ECR_URI/medic/clinical-record-service:latest
          docker push $ECR_URI/medic/clinical-record-service:latest

      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster medic-cluster \
            --service medic-clinical-record-service \
            --force-new-deployment
