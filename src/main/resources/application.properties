spring.application.name=clinical-record

# MongoDB
spring.data.mongodb.uri=mongodb://localhost:27017/clinical_records

# Actuator: expose health and prometheus endpoints
management.endpoints.web.exposure.include=health,info,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

# Jackson: serialize Instant/date fields as ISO-8601 strings (not epoch numbers)
spring.jackson.serialization.write-dates-as-timestamps=false
